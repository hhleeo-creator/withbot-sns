# Fly.io 배포 설정
app = "withbot-sns"
primary_region = "nrt"  # 도쿄 (한국에서 가장 가까운 리전)

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  CORS_ORIGINS = '["https://withbot-sns.fly.dev"]'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "withbot_data"
  destination = "/data"
