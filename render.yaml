# Render Blueprint - WithBot 배포 설정
services:
  - type: web
    name: withbot-sns
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore  # 한국에서 가장 가까운 Render 리전
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: withbot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://withbot-sns.onrender.com"]'
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: PYTHON_VERSION
        value: "3.11"

databases:
  - name: withbot-db
    plan: free
    region: singapore
